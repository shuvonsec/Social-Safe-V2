<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>
    <style>
      .title { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 64px; font-weight: 700; fill: #ffffff; }
      .subtitle { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 32px; fill: rgba(255,255,255,0.86); }
      .badge { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 24px; font-weight: 600; fill: #60a5fa; letter-spacing: 0.02em; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)" rx="48" />
  <text class="badge" x="80" y="150">Trusted by creators, SMEs, and agencies across Malaysia</text>
  <text class="title" x="80" y="320">Recover Your Social Media Accounts — Fast, Secure, Ethical</text>
  <text class="subtitle" x="80" y="440">Locked out, hacked, or disabled? We restore access to Instagram,</text>
  <text class="subtitle" x="80" y="490">Facebook, TikTok, X/Twitter, YouTube and more.</text>
</svg>
